# Cowork standard Dependabot config
# Propagated by propagate.py into each repo at .github/dependabot.yml
# Multi-ecosystem: pip + npm + cargo, weekly cadence, grouped updates.

version: 2
updates:
  # Python (pip + uv-managed projects)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # JavaScript / TypeScript / Astro (npm, pnpm, yarn)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      js-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Rust (cargo)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow files
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
